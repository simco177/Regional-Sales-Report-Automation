name: Generate Regional Sales Report

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: Start date in YYYY-MM-DD format
        required: true
        type: string
      end_date:
        description: End date in YYYY-MM-DD format
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run automated tests
        run: python -m unittest tests/test_generate_report.py

      - name: Generate Excel report
        run: |
          python scripts/generate_report.py \
            "${{ inputs.start_date }}" \
            "${{ inputs.end_date }}" \
            --output regional_sales_reports/regional_sales_report.xlsx \
            --html-output outputs/site/index.html

      - name: Save generated Excel report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add regional_sales_reports/regional_sales_report.xlsx
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update regional sales report"
          git push

      - name: Configure GitHub Pages
        if: github.event.repository.private == false
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        if: github.event.repository.private == false
        uses: actions/upload-pages-artifact@v5
        with:
          path: outputs/site

  deploy-report:
    if: github.event.repository.private == false
    needs: generate-report
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
